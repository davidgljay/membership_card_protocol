services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: wallet_service
      POSTGRES_PASSWORD: wallet_service
      POSTGRES_DB: wallet_service
    ports:
      - '5433:5432'
    volumes:
      - wallet_pg_data:/var/lib/postgresql/data

  synapse-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - synapse_pg_data:/var/lib/postgresql/data
    networks:
      - card-net

  synapse:
    # Build context is the repo root, not wallet-service/ — corrected
    # 2026-07-14 (Phase 6 Step 22's first live boot). matrix/Dockerfile pip-
    # installs matrix-policy-module *and* membership_card_verifier/packages/
    # verifier-py (the former's dependency, via a relative `file:` path in
    # its pyproject.toml pending PyPI publish) — the latter lives outside
    # wallet-service/ entirely, as a sibling directory under the repo root,
    # so wallet-service/ alone as a build context could never reach it.
    # Deliberately no runtime bind-mount for matrix-policy-module here — per
    # matrix_synapse_module.md, the module is meant to be pinned into the
    # image at build time, not fetched at runtime; a bind mount would
    # silently defeat that and shadow whatever's baked in.
    build:
      context: ..
      dockerfile: wallet-service/matrix/Dockerfile
    volumes:
      - ./matrix/homeserver.yaml:/data/homeserver.yaml:ro
      - ./matrix/appservice-registration.yaml:/data/appservice-registration.yaml:ro
      - ./matrix/secrets:/data/secrets:ro
      - synapse_media:/data/media
      - synapse_membership_registry:/data/membership_registry
    environment:
      PYTHONUNBUFFERED: "1"
      SYNAPSE_SERVER_NAME: ${MATRIX_SERVER_NAME}
      ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL}
      ARBITRUM_RPC_WS_URL: ${ARBITRUM_RPC_WS_URL}
      REGISTRY_CONTRACT_ADDRESS: ${REGISTRY_CONTRACT_ADDRESS}
      IPFS_GATEWAY_URL: ${IPFS_GATEWAY_URL}
      MATRIX_SERVER_NAME: ${MATRIX_SERVER_NAME}
      JOIN_ATTESTATION_FRESHNESS_SECONDS: ${JOIN_ATTESTATION_FRESHNESS_SECONDS}
      WATCHER_BACKSTOP_INTERVAL_SECONDS: ${WATCHER_BACKSTOP_INTERVAL_SECONDS}
      MATRIX_MEMBERSHIP_REGISTRY_PATH: ${MATRIX_MEMBERSHIP_REGISTRY_PATH}
      MATRIX_MEMBERSHIP_REGISTRY_KEY_PATH: ${MATRIX_MEMBERSHIP_REGISTRY_KEY_PATH}
      MATRIX_ENFORCEMENT_USER_ID: ${MATRIX_ENFORCEMENT_USER_ID}
    # The base image's ENTRYPOINT is /start.py (unchanged by matrix/Dockerfile,
    # which only FROM+COPYs) — command: supplies *arguments to start.py*, not a
    # replacement for it. start.py expects a mode ("run", "generate", ...) as
    # its first arg and forwards --config-path flags to the actual
    # `python -m synapse.app.homeserver` invocation itself; it does not accept
    # "python" as a mode.
    command: ["run", "--config-path=/data/homeserver.yaml", "--config-path=/data/secrets/registration-shared-secret.yaml"]
    # Generous start_period: cold module-import time (web3's own import
    # chain measured 100s+ on this build environment before bytecode
    # precompilation) can otherwise exceed the base image's default
    # healthcheck start_period and get marked unhealthy while still
    # legitimately starting. Found during Phase 6 Step 22 (2026-07-14).
    healthcheck:
      start_period: 5m
    depends_on:
      - synapse-postgres
    networks:
      - card-net
    # NOT exposed publicly; not in `ports:` — only the wallet-service AS
    # bridge and, once client-sdk connects directly for E2EE sync, an
    # internal-only network path reach it.
    # NOTE (corrected 2026-07-16, spec-consistency review): this comment used to
    # assert that the container "also runs a long-running watcher process" that
    # needs outbound access to ARBITRUM_RPC_WS_URL. That is not currently true —
    # matrix_policy_module/watcher.py's Watcher (subscription loop, backstop
    # loop, catch-up) is fully built and unit-tested, but
    # matrix_policy_module/module.py's PolicyModule.__init__ — the only
    # production entrypoint Synapse's module loader calls — never constructs
    # or starts it (see the TODO there, and
    # plans/spec-consistency/inconsistencies/phase-3-consolidated-fixes.md
    # Tier 3 item (e)). ARBITRUM_RPC_WS_URL is still wired into this service's
    # config below because the watcher will need it once startup wiring lands;
    # no process here currently uses it.

volumes:
  wallet_pg_data:
  synapse_pg_data:
  synapse_media:
  synapse_membership_registry:

networks:
  card-net:
