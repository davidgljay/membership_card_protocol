services:
  relay:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config
      - db_data:/data
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - APP_REGISTRY_PATH=/app/config/apps.json
      - DB_PATH=/data/registry.db
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db_data:
