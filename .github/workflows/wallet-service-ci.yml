name: Wallet Service CI

on:
  push:
    paths:
      - 'wallet-service/**'
      - '.github/workflows/wallet-service-ci.yml'
  pull_request:
    paths:
      - 'wallet-service/**'
      - '.github/workflows/wallet-service-ci.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wallet-service

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wallet_service
          POSTGRES_PASSWORD: wallet_service
          POSTGRES_DB: wallet_service
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://wallet_service:wallet_service@localhost:5433/wallet_service
      SECRETS_BACKEND: webcrypto
      WEBCRYPTO_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      SESSION_TOKEN_SECRET: ci-session-secret
      KV_BACKEND: postgres
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_ORIGIN: http://localhost:3000
      WALLET_SERVICE_ID: '0xedf12de717a83f603934011aee28f0fb995e2882846836c0d8fc136829ee2549'
