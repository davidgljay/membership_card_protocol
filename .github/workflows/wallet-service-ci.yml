      PEER_LIST: '[]'
      RELAY_BASE_URL: http://localhost:4000
      ADMIN_API_KEY: ci-admin-api-key

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: wallet-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run database migrations
        run: pnpm exec node-pg-migrate up --migrations-dir server/db/migrations --database-url-var DATABASE_URL

      - name: Test
        run: pnpm run test

      - name: Build (Cloudflare preset, default)
        run: pnpm run build

      - name: Build (Node preset, sanity check)
        run: pnpm run build:node
