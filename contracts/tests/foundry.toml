[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
via_ir = true
optimizer = true
optimizer_runs = 200

# ── Arbitrum Sepolia fork profile ──────────────────────────────────────────────
# Used for verifying the RIP-7212 precompile is live and for integration tests
# against deployed Stylus contracts.
# Run with: FOUNDRY_PROFILE=arbitrum_sepolia forge test
# No fork_block_number: always forks at latest to avoid Arbitrum's
# "metadata is not found" error (nodes only retain ~1000 blocks of metadata).
# Override the RPC with FOUNDRY_ETH_RPC_URL=<url> if you need a different endpoint.
[profile.arbitrum_sepolia]
eth_rpc_url = "https://sepolia-rollup.arbitrum.io/rpc"
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
ffi = true  # Required for vm.ffi calls to sign_payload / build_governance_payload

# ── Arbitrum One mainnet fork profile ─────────────────────────────────────────
# Override with FOUNDRY_ETH_RPC_URL=<url> if needed.
[profile.arbitrum_mainnet]
eth_rpc_url = "${ARBITRUM_MAINNET_RPC}"
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC}"
arbitrum_one = "${ARBITRUM_MAINNET_RPC}"
