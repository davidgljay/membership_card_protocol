[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "membership-card-verifier"
version = "0.1.0"
description = "Verifies SignedMessageEnvelope objects produced by the Card Protocol"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # >=47.0.0 required for cryptography.hazmat.primitives.asymmetric.mldsa
    # (ML-DSA support was added in that release — confirmed via pyca/
    # cryptography's own changelog, not assumed). Without a floor here, pip
    # resolving this package alongside another dependency's own older
    # `cryptography` pin (e.g. Synapse's base image) can silently keep the
    # older version and fail at import time with "cannot import name
    # 'mldsa'" — a real bug found during Matrix Phase 6 Step 22's first
    # live Synapse boot (2026-07-14).
    "cryptography>=47.0.0",
    "httpx",
    "pycryptodome",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "ruff",
    "mypy",
]

[tool.hatch.build.targets.wheel]
packages = ["src/membership_card_verifier"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100

[tool.mypy]
python_version = "3.11"
