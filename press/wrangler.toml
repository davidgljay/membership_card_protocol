name = "press"
main = ".output/server/index.mjs"
compatibility_date = "2026-06-29"
compatibility_flags = ["nodejs_compat"]

# PRESS_KV binding backs the press's Nitro storage mount (log heads, offers,
# rate-limit counters, app gas balances — see nitro.config.ts, src/kv.ts).
# ioredis (the `redis` driver's dependency, used only on the node-server/
# aws-lambda presets) can't run under Workers' nodejs_compat — see
# nitro.config.ts's comment. Operators provision their own KV namespace and
# set the id here or via `wrangler kv namespace create`.
[[kv_namespaces]]
binding = "PRESS_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Non-secret values can go in [vars] below for local `wrangler dev`;
# secrets should be supplied via `wrangler secret put` (deployed) or a
# gitignored `.dev.vars` file (local), never committed here.
